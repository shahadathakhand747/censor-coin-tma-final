kind = "web"
  previewPath = "/"
  title = "Censor Coin TMA"
  version = "1.0.0"
  id = "artifacts/censor-coin-tma"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 18360

  [services.development]
  run = "pnpm --ignore-workspace run dev"

  [services.production]
  build = [ "pnpm", "--ignore-workspace", "run", "build" ]
  publicDir = "dist"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "18360"
  BASE_PATH = "/"
  