name: Build & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        env:
          npm_config_user_agent: pnpm/10

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production
          PORT: "5173"
          BASE_PATH: "/"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: censor-coin-tma-dist
          path: dist/
          retention-days: 7
